<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌍 World Map Explorer</title>
  <meta name="description" content="An interactive world map explorer for kids — tap continents and countries to discover animals, monuments, and fun facts!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- PWA & iOS Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="World Map">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0B0D17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    #splash-screen.fade-out { opacity: 0; pointer-events: none; }
    #splash-screen .splash-emoji { font-size: 5rem; animation: splash-pulse 1.2s ease-in-out infinite; }
    #splash-screen .splash-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6C63FF, #48BFE3, #64DFDF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 16px;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-emoji">🌍</div>
    <div class="splash-title">World Explorer</div>
  </div>

  <!-- Stars background -->
  <div id="stars"></div>

  <!-- Header -->
  <header id="app-header">
    <button id="back-btn" class="header-btn hidden" aria-label="Go back">
      <span class="back-arrow">←</span>
    </button>
    <h1 id="header-title">🌍 World Explorer</h1>
  </header>

  <!-- World View -->
  <main id="world-view" class="view active">
    <div id="game-banner" class="hidden">
      <p id="game-prompt">Where is Africa?</p>
    </div>
    <p class="subtitle" id="world-subtitle">Tap a continent to explore!</p>
    <div id="map-container">
      <svg id="world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </main>

  <!-- Continent View -->
  <main id="continent-view" class="view">
    <div id="continent-hero">
      <img id="continent-hero-img" src="" alt="">
    </div>
    <p class="subtitle" id="continent-subtitle"></p>
    <button id="view-trains-btn" class="action-btn">🚂 View Trains</button>
    <div id="country-grid"></div>
  </main>

  <!-- Fact Card Overlay -->
  <div id="fact-card" class="overlay hidden">
    <div class="fact-card-inner">
      <button class="overlay-back-btn" id="fact-card-back" aria-label="Go back">← Back</button>
      <div class="fact-card-header">
        <span id="fact-flag"></span>
        <h2 id="fact-country-name"></h2>
        <p id="fact-capital" class="capital-text"></p>
      </div>
      <div id="fact-tabs" class="tab-bar"></div>
      <div id="fact-content" class="fact-content"></div>
      <p id="fact-fun" class="fun-fact-box"></p>
    </div>
  </div>

  <!-- Train Overlay -->
  <div id="train-overlay" class="overlay hidden">
    <div class="fact-card-inner train-overlay-inner">
      <button class="overlay-back-btn" id="train-overlay-back" aria-label="Go back">← Back</button>
      <div class="fact-card-header">
        <h2 id="train-continent-title">Trains</h2>
      </div>
      <div id="train-grid" class="train-grid"></div>
    </div>
  </div>

  <!-- Train Image Pop-out Overlay -->
  <div id="train-image-overlay" class="overlay hidden">
    <div class="train-image-container">
      <button class="overlay-back-btn" id="train-image-back" aria-label="Go back">← Back</button>
      <img id="train-pop-img" src="" alt="">
    </div>
  </div>
  <!-- Passport Overlay -->
  <div id="passport-overlay" class="overlay hidden">
    <div class="fact-card-inner">
      <button class="overlay-back-btn" id="passport-back" aria-label="Go back">← Back</button>
      <div class="fact-card-header">
        <h2>🎒 My Passport</h2>
        <p style="color: var(--text-secondary); margin-top: 4px;">Collect stickers from around the world!</p>
      </div>
      <div id="passport-grid" class="passport-grid"></div>
    </div>
  </div>

  <!-- Floating Controls -->
  <div id="floating-controls">
    <button id="sound-toggle" class="header-btn" aria-label="Toggle sound">🔊</button>
  </div>
  <!-- Travel Journal Side Panel -->
  <div id="travel-journal" class="side-panel hidden">
    <div class="panel-header">
      <h3>🚂 Travel Journal</h3>
      <button id="close-journal" class="close-btn">×</button>
    </div>
    <div class="panel-content">
      <p class="journal-summary">Distance: <span id="journal-distance">0</span> km</p>
      <ul id="journal-list"></ul>
    </div>
  </div>

  <!-- Bottom Controls -->
  <div id="mode-controls">
    <button id="journey-toggle" class="quiz-btn" aria-label="Toggle Journey Mode">🚂 Journey</button>
    <button id="game-toggle" class="quiz-btn" aria-label="Toggle Quiz Mode">🎯 Quiz</button>
    <button id="passport-toggle" class="quiz-btn" aria-label="Open Passport">🎒 Passport</button>
  </div>

  <script src="world_map_data.js" defer></script>
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered!', reg))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
